<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎶 Harmonics Music Box</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <h1>Harmonics</h1>
  </div>
  <div class="container">
    <h1>🎶 Harmonics Music Box</h1>

    <div class="buttons" id="number-buttons"></div>

    <fieldset class="controls">
      <legend>Controls</legend>
      <label for="loop">🔁 Loop</label>
      <input type="checkbox" id="loop" />

      <label for="speedSlider">🐢 Speed 🐇</label>
      <input type="range" id="speedSlider" min="0.25" max="2" value="1" step="0.05">
    </fieldset>

    <div class="sequence">
      <p>Sequence: <span id="sequenceDisplay">None</span></p>
    </div>

    <div class="actions">
      <button id="play" aria-label="Play sequence">▶️ Play</button>
      <button id="stop" aria-label="Stop sequence">🛑 Stop</button>
      <button id="clear" aria-label="Clear sequence">🧽 Clear</button>
      <button id="random" aria-label="Generate random sequence">🎲 Random</button>
    </div>

    <div id="status" aria-live="polite" class="status"></div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
